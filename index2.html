<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Pixel Fixer</title> <style> body { margin: 0; height: 100vh; width: 100vw; } </style> </head> <body> <script> const colors = ["red","green","blue","white","black"]; let i = 0; setInterval(() => { document.body.style.backgroundColor = colors[i]; i = (i+1) % colors.length; }, 200); // змінює колір кожні 200 мс </script> </body> </html>
